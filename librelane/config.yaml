CLOCK_PERIOD: 10

# SDC
PNR_SDC_FILE: dir::../src/adder_4b.sdc
SIGNOFF_SDC_FILE: dir::../src/adder_4b.sdc

# Floorplan — macro tres petit (17 cellules)
FP_SIZING: absolute
DIE_AREA: [0, 0, 40, 40]
