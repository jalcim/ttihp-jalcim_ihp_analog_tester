meta:
  version: 3
  flow: Classic
  substituting_steps: {}

# --- Hard macro : adder_4b seul ---
DESIGN_NAME: adder_4b
VERILOG_FILES:
- dir::../src/adder_4b.v

# Power
VDD_NETS: [VDD]
GND_NETS: [VSS]

# Pas d'horloge (combinatoire pur)
